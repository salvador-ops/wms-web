<h2>Inventario</h2>

<form action="/agregar" method="POST">
    SKU: <input name="sku">
    Producto: <input name="producto">
    Ubicación: <input name="ubicacion">
    Stock: <input name="stock">
    Mínimo: <input name="minimo">
    <button>Agregar</button>
</form>

<table border="1">
<tr>
    <th>SKU</th><th>Producto</th><th>Stock</th>
</tr>

{% for item in data %}
<tr>
    <td>{{ item[0] }}</td>
    <td>{{ item[1] }}</td>
    <td>{{ item[3] }}</td>
</tr>
{% endfor %}

</table>
